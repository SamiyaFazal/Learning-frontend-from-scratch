<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="Weather.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" class="search-bar" placeholder="Enter city name">
            <button>🔍</button>
        </div>
        <div class="weather">
            <h2 class="city">Weather in  Tokyo</h2>
            <h2 class="temp">9.82°C</h2>
            <div class="description">Broken Clouds</div>
            <div class="details">
                <p class="humidity">Humidity: 66%</p>
                <p class="wind">Wind: 3.6km/h</p>
            </div>
        </div>

    </div>

    <script src="Weather.js"></script>
</body> 
</html>
